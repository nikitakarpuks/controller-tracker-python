data:
  root: "/home/nikitakarpuks/PyCharmProjects/controller-tracker-python/data/datasets/two_ctrl/controllers/4_MAIN_complex_moves_hand_ctrl_occlusions_occluded_spin/simple"
  img_width: 2560
  img_height: 481
  total_cameras_number: 4
  selected_cameras: [0, 1] # choose any sequential cameras, max list is [0, 1, 2, 3]

cameras:
  intrinsics_path: "./data/cameras/mateosss.reverbg2v1.kleineinzeigen.bslt.json"

controllers:
  right_controller:
    enabled: true
    config_path: "./data/controllers/right_controller_A85K6081930636R.json"
    mesh_alignment:
      translation: # in meters
        x: 0.19610239
        y: 0.01522315
        z: -0.09380996
      rotation: # in radians
        rx: -0.00523160
        ry: 0.22553752
        rz: 3.15
    handle_primitives:
      boxes:
        - name: box_vertical
          center: [-0.009, -0.012, -0.015]
          half_dims: [0.022, 0.0028, 0.013]
          color: [220, 130, 60]
        - name: box_horizontal
          center: [-0.009, -0.029, -0.0048]
          half_dims: [0.021, 0.0032, 0.015]
          axes: [[1, 0, 0], [0, 0, 1], [0, -1, 0]]   # columns: local-x=[1,0,0], local-y=[0,0,-1], local-z=[0,1,0]
          color: [130, 60, 220]
      cylinders:
        - name: control_panel
          center: [-0.008, 0.0, -0.05]
          axis: [0.0, 1.0, 0.0]
          radius: 0.031
          radius_v: 0.033
          half_length: 0.017
          angle: 0.31416   # pi/10
          color: [100, 180, 255]
        - name: handle
          center: [0.001, 0.022, -0.098]
          axis: [0.0, 1.0, -1.5]
          radius: 0.021
          half_length: 0.037
          color: [255, 55, 55]
  left_controller:
    enabled: false
    config_path: "./data/controllers/left_controller_A85K5091630091L.json"
    # mesh_alignment is not stored here: left mesh = X-reflection of right mesh
    # handle_primitives are auto-derived by X-mirroring right_controller primitives in main.py

blob_detection:
  min_threshold: 6       # pixels >= this are included in a blob
  required_threshold: 12  # blob must contain at least one pixel >= this (filters dim noise)
  min_area: 4
  max_area: 250
  max_wh: 35              # max bounding-box width or height in pixels
  min_split_dist: 4.0
  split_valley_ratio: 0.6  # saddle_min/lower_peak must be below this to allow splitting; suppresses false splits in single bright blobs
  min_circularity: 0.5      # 4π·area/perimeter² must exceed this after splitting; rejects elongated non-circular shapes
  area_outlier_k: 6.0      # blob area > median(area) + this * MAD(area) is rejected before matching
  outlier_factor: 3.0      # blob with 1-NN distance > this * median(1-NN) is rejected as spatially isolated noise
  debug_bbox: null        # [x1, y1, x2, y2] — log why any centroid inside this pixel bbox was dropped

geometry:
  z_frustum_top_padding: 0.0045   # metres added above the topmost outer LED axial position
  z_frustum_bot_padding: 0.0055   # metres subtracted below the bottommost outer LED axial position
  wall_thickness: 0.007           # frustum wall thickness in metres (R_fc_inner = R_fc - wall_thickness)

matching:
  led_facing_angle_deg: 85.0      # LED emission half-angle; LEDs beyond this from camera axis are culled
  depth_tiers:
    - [2, 3]
    - [2, 4]
    - [2, 4, "edge"]
    - [3, 5]
    - [3, 5, "edge"]
    - [4, 6]
  p4_threshold_px: 2.0
  hungarian_threshold_px: 5.0     # loose pre-filter on raw P3P pose; RANSAC does the real filtering
  reprojection_threshold: 2.5              # brute_match RANSAC threshold
  proximity_reprojection_threshold: 2.0   # proximity_match RANSAC threshold (tighter — prior is already close)
  min_inliers: 4
  min_inlier_fraction: null       # e.g. 0.6 — overrides min_inliers if set, number of min BLOBS
  strong_match_inliers: 7
  strong_match_error_px: 1.5
  min_vis_coverage: 0.7
  rng_seed: 42
  use_proximity_match: true          # set to false to skip proximity match and always use brute force
  blob_tracking_snap_px: 25.0       # max pixel distance to carry a led_id from prev blob to current blob
  led_radius_mm: 3.0                # physical LED emitter radius; used to compute depth-scaled snap threshold
  proximity_snap_factor: 4.0        # snap_px = focal * (led_radius_mm/1000) / depth_m * this factor
  blob_size_max_factor: 4.0         # blob radius > expected * this → excluded (merged blob / noise)
  blob_size_min_factor: 0.2         # blob radius < expected * this → excluded (sub-pixel noise)
  blob_size_score_weight: 0.5       # px penalty per px of size mismatch added to argmin score
  proximity_expansion_threshold: 0.7  # if locked/model_visible < this after snap, run Hungarian to lock more
  proximity_expansion_px: 8.0         # max reprojection distance to accept a Hungarian-expanded pair
  proximity_vis_drop_threshold: 2     # also run Hungarian expansion if prior LED count dropped by more than this
  proximity_argmin_max_dist_px: 5.0   # hard cap on argmin (non-ID-path) snap distance; ID-path uses full depth-scaled snap_px
  pose_jump_pos_thresh_m: [0.25, 0.25, 0.30]   # per-axis translation jump limit [x, y, z] in metres
  pose_jump_rot_thresh_deg: [30.0, 30.0, 30.0] # per-axis rotation jump limit [rx, ry, rz] in degrees
  joint_optimization: true          # run joint LM over all cameras after RANSAC when aux correspondences exist
  joint_primary_weight: 8.0        # primary camera residual multiplier in joint LM (keeps RANSAC-validated fit dominant)
  joint_huber_scale: 1.5            # Huber loss threshold in pixels; residuals beyond this are soft-capped
  joint_aux_prefilter_px: 8.0       # aux pairs with reprojection > this (evaluated at RANSAC pose) are dropped before joint LM
  camera_handoff: true               # promote aux camera to primary when it dominates for several consecutive frames
  handoff_coverage_ratio: 1.3        # aux must have >= this * primary LED count
  handoff_min_advantage: 3           # aux must have >= this many more LEDs than primary (absolute)
  handoff_hysteresis_frames: 2       # must dominate for this many consecutive frames before switching

debug:
  mode_active: true
  split_to_folders: false
  verbose_all: false              # log every P3P hypothesis (no LED/blob filter needed)
  log_best: true                  # log each new best solution update
  debug_led_ids: null             # e.g. [0, 14, 3]  — LED triple [anchor, l1, l2]
  debug_blob_ids: null            # e.g. [2, 5, 3]  — blob triple [b_anchor, b1, b2]

visualization:
  3d_model_path: "./data/controllers/reverb_g2_controller_3d_model.stp"
  save_recording: "./visualization/recording.rrd"  # set to null to disable saving
  fine_tune_alignment: false  # set to true to run alignment optimiser and print refined params
