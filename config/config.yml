data:
  root: "./data/datasets/two_ctrl/controllers/9_moving_between_cameras/both/a"
#  root: "./data/datasets/two_ctrl/controllers/9_moving_between_cameras/ctrl_occlusion"
  img_width: 2560
  img_height: 481
  total_cameras_number: 4
  selected_cameras: [0, 1, 2, 3] # choose any sequential cameras, max list is [0, 1, 2, 3]

cameras:
  intrinsics_path: "./data/cameras/mateosss.reverbg2v1.kleineinzeigen.bslt.json"
#  intrinsics_path: "./data/cameras/self_calibrated_extrinsics_merged.json"
#  intrinsics_path: "./data/cameras/cam-calib.json"

controllers:
  right_controller:
    enabled: true
    config_path: "./data/controllers/right_controller_A85K6081930636R.json"
    mesh_alignment:
      translation: # in meters
        x: 0.19610239
        y: 0.01522315
        z: -0.09380996
      rotation: # in radians
        rx: -0.00523160
        ry: 0.22553752
        rz: 3.15
    handle_primitives:
      boxes:
        - name: box_vertical
          center: [-0.009, -0.012, -0.015]
          half_dims: [0.022, 0.0028, 0.013]
          color: [220, 130, 60]
        - name: box_horizontal
          center: [-0.009, -0.029, -0.0048]
          half_dims: [0.021, 0.0032, 0.015]
          axes: [[1, 0, 0], [0, 0, 1], [0, -1, 0]]   # columns: local-x=[1,0,0], local-y=[0,0,-1], local-z=[0,1,0]
          color: [130, 60, 220]
      cylinders:
        - name: control_panel
          center: [-0.008, 0.0, -0.05]
          axis: [0.0, 1.0, 0.0]
          radius: 0.031
          radius_v: 0.033
          half_length: 0.017
          angle: 0.31416   # pi/10
          color: [100, 180, 255]
        - name: handle
          center: [0.001, 0.022, -0.098]
          axis: [0.0, 1.0, -1.5]
          radius: 0.021
          half_length: 0.037
          color: [255, 55, 55]
  left_controller:
    enabled: true
    config_path: "./data/controllers/left_controller_A85K5091630091L.json"
    # mesh_alignment is not stored here: left mesh = X-reflection of right mesh
    # handle_primitives are auto-derived by X-mirroring right_controller primitives in main.py

blob_detection:
  visualize: true
  min_threshold: 6       # pixels >= this are included in a blob
  required_threshold: 13  # blob must contain at least one pixel >= this (filters dim noise)
  min_area: 3
  max_area: 250
  max_wh: 35              # max bounding-box width or height in pixels
  min_split_dist: 4.0
  split_valley_ratio: 0.6  # saddle_min/lower_peak must be below this to allow splitting; suppresses false splits in single bright blobs
  min_circularity: 0.5      # 4π·area/perimeter² must exceed this after splitting; rejects elongated non-circular shapes
  area_outlier_k: 10.0      # blob area > median(area) + this * MAD(area) is rejected before matching
  outlier_factor: 2.5      # blob with 1-NN distance > this * median(1-NN) is rejected as spatially isolated noise
  pass2_threshold_factor: 0.7       # 0 = disabled; pixel_threshold_2 = percentile(mean_per_blob) * factor
  pass2_required_factor: 1.2        # required_threshold_2 = percentile(mean_per_blob) * factor; must be > pass2_threshold_factor
  pass2_brightness_percentile: 25   # percentile of per-blob mean intensities used as brightness reference (low = anchor to dimmer cluster)
  pass2_min_area: 1             # null = use min_area; override minimum blob area for pass 2 (blobs shrink under higher threshold, so this can be smaller)
  pass2_threshold_ema_alpha: 0.25       # EMA weight on the newly computed threshold (0=frozen, 1=no smoothing); smooths frame-to-frame instability
  pass2_count_gate_max_factor: 1.7      # skip EMA update if blob count changes by more than this factor between frames (count jump = scene transition, not brightness change)

  # H1: interior-of-large-blob exclusion (pass-2 only)
  # Pass-2 candidates whose centroid is deep inside a pass-1 large rejected blob are dropped.
  # "Deep" = distance-to-nearest-edge > factor * large_blob_radius.
  interior_edge_margin_px: 10.0    # static px distance from contour edge; centroid farther inside than this is rejected

  # H2: smooth-gradient filter (all passes, very last step)
  # Casts rays outward from the NMS peak (same logic as split detection).
  # Rays must be monotonically non-increasing in the original image within the
  # tolerance, stopping early at a valley (same convention as split_valley_ratio).
  gradient_radius_factor: 2.5       # neighbourhood radius = factor * blob_radius
  gradient_num_rays: 16             # rays cast (22.5° apart)
  gradient_valley_ratio: 0.6        # aligned with split_valley_ratio; stop ray at this fraction of peak
  gradient_step_tolerance: 0.15     # allow up to 15% per-step intensity increase (noise)
  gradient_max_bad_ray_fraction: 0.4  # reject blob if ≥ this fraction of rays are non-monotonic
  gradient_min_radius: 5.0          # minimum neighbourhood radius in px (handles very small blobs)

  debug_bbox: null        # [x1, y1, x2, y2] — log why any centroid inside this pixel bbox was dropped

geometry:
  z_frustum_top_padding: 0.0045   # metres added above the topmost outer LED axial position
  z_frustum_bot_padding: 0.0055   # metres subtracted below the bottommost outer LED axial position
  wall_thickness: 0.007           # frustum wall thickness in metres (R_fc_inner = R_fc - wall_thickness)

matching:

  # --------------------------------------------------------------------------
  # LED physical model
  # --------------------------------------------------------------------------
  led_facing_angle_deg: 85.0      # emission half-angle; LEDs beyond this from camera axis are culled
  led_radius_mm: 3.0              # physical emitter radius; drives depth-scaled snap and size thresholds

  # --------------------------------------------------------------------------
  # Blob size filtering  (shared pre-filter for both brute and proximity)
  # --------------------------------------------------------------------------
  log_size_filter: false
  blob_size_max_factor: 10.0       # blob radius > expected * this → rejected (merged blob / noise)
  blob_size_min_factor: 0.01       # blob radius < expected * this → rejected (sub-pixel noise)
  blob_size_score_weight: 0.5     # px penalty per px of size mismatch added to argmin score

  # --------------------------------------------------------------------------
  # Brute match
  # --------------------------------------------------------------------------
  depth_tiers:                    # (anchor_leds, total_leds [, "edge"]) hypotheses to enumerate
    - [2, 3]
    - [2, 4]
    - [2, 4, "edge"]
#    - [3, 5]
#    - [3, 5, "edge"]
#    - [4, 6]
  p4_threshold_px: 2.5
  hungarian_threshold_px: 5.0    # loose pre-filter on raw P3P pose; RANSAC does the real filtering
  reprojection_threshold: 2.5    # RANSAC inlier threshold
  min_inliers: 4
  min_inlier_fraction: null      # e.g. 0.6 — overrides min_inliers if set (fraction of visible LEDs)
  strong_match_error_px: 1.0
  min_vis_coverage: 0.7
  rng_seed: 42

  # --------------------------------------------------------------------------
  # Proximity match
  # --------------------------------------------------------------------------
  use_proximity_match: true              # set to false to always use brute force
  proximity_min_inliers: 3               # min inliers for proximity match (can be lower than min_inliers
                                          # because the pose prior is already close; null = use min_inliers)
  proximity_reprojection_threshold: 2.0  # RANSAC threshold (tighter than brute — prior is already close)
  blob_tracking_snap_px: 25.0           # max pixel distance to carry a led_id from prev frame to current
  proximity_snap_factor: 3.0            # depth-scaled snap: focal * (led_radius_mm/1000) / depth * factor
  proximity_argmin_max_dist_px: 5.0     # hard cap on argmin (non-ID-path) snap; ID-path uses full depth-scaled snap_px
  proximity_expansion_threshold: 0.7    # run Hungarian expansion if locked/model_visible < this after snap
  proximity_expansion_px: 4.0           # max reprojection distance to accept a Hungarian-expanded pair (primary cam)
  proximity_vis_drop_threshold: 2       # also expand if prior LED count dropped by more than this
  projection_snap_px: 25.0              # projection fallback: max Hungarian cost to accept a blob-LED pair
  aux_snap_px: 15.0                     # snap cap for aux cameras (looser than primary — calibration offsets)
  proximity_mutual_exclusion_px: 15.0  # Phase 3 radius: blobs within this of a later controller's projected
                                        # LEDs (and closer to it) are reserved when only one controller has a pose
  voronoi_max_dist_px: 100.0           # Phase 4 radius: when both controllers have poses, partition all blobs
                                        # within this distance of either controller's LEDs (full Voronoi territory)

  # --------------------------------------------------------------------------
  # Multi-controller ordering
  # --------------------------------------------------------------------------
  first_controller: "right"            # "right" or "left": which controller runs first and claims blobs first
                                        # when both controllers have equal tracking status (both tracked or both cold)

  # --------------------------------------------------------------------------
  # Pose validation
  # --------------------------------------------------------------------------
  accept_error_px: 1.5                          # max mean reprojection error to accept any solution
  pose_jump_pos_thresh_m: [0.25, 0.25, 0.30]    # per-axis translation jump limit [x, y, z] in metres
  pose_jump_rot_thresh_deg: [30.0, 30.0, 30.0]  # per-axis rotation jump limit [rx, ry, rz] in degrees

  # --------------------------------------------------------------------------
  # Joint multi-camera optimisation
  # --------------------------------------------------------------------------
  joint_optimization: true         # run joint LM over all cameras after RANSAC when aux correspondences exist
  joint_primary_weight: 8.0        # primary-camera residual multiplier (keeps RANSAC-validated fit dominant)
  joint_huber_scale: 1.5           # Huber loss threshold in pixels; residuals beyond this are soft-capped
  joint_aux_prefilter_px: 10.0      # drop aux pairs with reprojection > this before joint LM

  # --------------------------------------------------------------------------
  # Cross-controller occlusion
  # --------------------------------------------------------------------------
  cross_controller_occlusion: true        # mask LEDs of controller B that are occluded by controller A's body
  cross_occlusion_bounding_radius_m: 0.18  # controller body bounding sphere radius (tune manually)
  cross_occlusion_gate_margin_px: 20.0     # slack added to the 2D projection gate threshold

  # --------------------------------------------------------------------------
  # Primary camera selection
  # --------------------------------------------------------------------------
  fixed_primary_camera: null       # integer camera index to always use as primary, or null = auto-select

  # --------------------------------------------------------------------------
  # Camera handoff (ignored when fixed_primary_camera is set)
  # --------------------------------------------------------------------------
  camera_handoff: true             # promote aux camera to primary when it dominates for several frames
  handoff_coverage_ratio: 1.3      # aux must have >= this * primary LED count
  handoff_min_advantage: 2         # aux must have >= this many more LEDs than primary (absolute)
  handoff_hysteresis_frames: 2     # must dominate for this many consecutive frames before switching

self_calibration:
  enabled: false                  # set to true to enable online extrinsic calibration
  primary_camera: 1               # camera whose extrinsics are held fixed (anchor)
  lock_primary: true              # prevent handoff away from primary_camera
  aux_cameras: [0]                # cameras to calibrate; null = all non-primary cameras
  min_primary_error_px: 0.5       # only accept frames with primary PnP error below this
  min_primary_inliers: 6          # minimum PnP inliers for a frame to be accepted
  min_frames: 50                  # minimum observations before running optimisation
  max_frames: 300                 # circular buffer size per aux camera
  run_every_n_frames: 10          # run optimisation every N accepted frames
  output_path: "./data/cameras/self_calibrated_extrinsics.json"
  source_calibration: "./data/cameras/mateosss.reverbg2v1.kleineinzeigen.bslt.json"  # patched copy written alongside output
  apply_on_load: false             # apply saved calibration at startup if output file exists

debug:
  mode_active: true
  split_to_folders: false
  verbose_all: false              # log every P3P hypothesis (no LED/blob filter needed)
  log_best: true                  # log each new best solution update
  debug_led_ids: [4, 15, 17]            # e.g. [0, 14, 3]  — LED triple [anchor, l1, l2]
  debug_blob_ids: [0, 5, 4]          # e.g. [2, 5, 3]  — blob triple [b_anchor, b1, b2]

visualization:
  3d_model_path: "./data/controllers/reverb_g2_controller_3d_model.stp"
  save_recording: "./visualization/recording.rrd"  # set to null to disable saving
  fine_tune_alignment: false  # set to true to run alignment optimiser and print refined params
