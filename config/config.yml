data:
  root: "./data/datasets/single_ctrl/2_r_ctrl_edge_handle_occlusion/a"
  img_width: 2560
  img_height: 481
  has_technical_row: true  # first pixel row encodes exposure/gain; set false if the row is absent
  total_cameras_number: 4
  selected_cameras: [0, 1] #, 2, 3] # choose any sequential cameras, max list is [0, 1, 2, 3]

cameras:
#  intrinsics_path: "./data/cameras/mateosss.reverbg2v1.kleineinzeigen.bslt.json"
#  intrinsics_path: "./data/cameras/mateo_fresh_calib.json"
#  intrinsics_path: "./data/cameras/my_calibration.json"

  intrinsics_path: "./data/cameras/new/calibration_kleinen_c.json"

  extrinsics_convention: "T_imu_cam"   # "T_imu_cam" or "T_cam0_camN"

controllers:
  right_controller:
    enabled: true
    config_path: "./data/controllers/right_controller_A85K6081930636R.json"
    mesh_alignment:
      translation: # in meters
        x: 0.19610239
        y: 0.01522315
        z: -0.09380996
      rotation: # in radians
        rx: -0.00523160
        ry: 0.22553752
        rz: 3.15
    handle_primitives:
      boxes:
        - name: box_vertical
          center: [-0.009, -0.012, -0.015]
          half_dims: [0.022, 0.0028, 0.013]
          color: [220, 130, 60]
        - name: box_horizontal
          center: [-0.009, -0.029, -0.0048]
          half_dims: [0.021, 0.0032, 0.015]
          axes: [[1, 0, 0], [0, 0, 1], [0, -1, 0]]   # columns: local-x=[1,0,0], local-y=[0,0,-1], local-z=[0,1,0]
          color: [130, 60, 220]
      cylinders:
        - name: control_panel
          center: [-0.008, 0.0, -0.05]
          axis: [0.0, 1.0, 0.0]
          radius: 0.031
          radius_v: 0.033
          half_length: 0.017
          angle: 0.31416   # pi/10
          color: [100, 180, 255]
        - name: handle
          center: [0.001, 0.022, -0.098]
          axis: [0.0, 1.0, -1.5]
          radius: 0.021
          half_length: 0.037
          color: [255, 55, 55]
  left_controller:
    enabled: false
    config_path: "./data/controllers/left_controller_A85K5091630091L.json"
    # mesh_alignment is not stored here: left mesh = X-reflection of right mesh
    # handle_primitives are auto-derived by X-mirroring right_controller primitives in main.py

blob_detection:

  # ── Common (both warm and cold paths) ────────────────────────────────────
  visualize: false
  min_threshold: 6                  # pixels >= this are included in a blob
  min_area: 2
  max_area: 250
  min_split_dist: 4.0
  split_valley_ratio: 0.6           # saddle_min/lower_peak must be below this to allow splitting
  min_circularity: 0.5              # 4π·area/perimeter² must exceed this; rejects elongated shapes
  required_threshold_factor: 1.5   # required_threshold = clip(pixel_threshold * factor, 255)
  velocity_threshold_k: 0.013          # scale = 1/(1 + k*v_px); lowers threshold at speed; 0 = disabled
  velocity_threshold_min_factor: 0.75  # floor: threshold never drops below this fraction of base

  # ── Warm path (active when a predicted pose is available) ─────────────────
  pose_guided_thresholds:
    # Formula: threshold = a * facing_cos / depth_m² + b
    #   a  — scales the Lambertian + inverse-square physics term
    #   b  — constant floor independent of geometry (noise baseline)
    pixel_threshold:
      a: 0.622
      b: 15.17
    max_area:
      a: 0.20779
      b: 25.0
    min_area:
      a: 0.20779
      b: -9.0
  local_search_depth_k: 0.0         # extra radius: r = base + k/depth_m (0 = fixed radius)
  blob_cross_mask_margin_px: 3      # extra px added to matched-blob radius when masking ctrl A from ctrl B

  # ── Cold path – pass 1 (full-image detection, no prior) ───────────────────
  outlier_factor: 2.5               # 1-NN distance > this * median(1-NN) → spatial outlier
  interior_edge_margin_px: 10.0    # centroid farther inside a large rejected blob than this is dropped

  # ── Cold path – pass 2 (adaptive re-threshold, optional) ──────────────────
  pass2_threshold_factor: 0.7       # 0 = disabled; pixel_threshold_2 = percentile(mean_per_blob) * factor
  pass2_required_factor: 1.2        # required_threshold_2 = percentile(mean_per_blob) * factor; must be > pass2_threshold_factor
  pass2_brightness_percentile: 25   # percentile of per-blob mean intensities used as brightness reference
  pass2_min_area: 2                 # null = use min_area; blobs shrink under higher threshold so can be smaller
  pass2_threshold_ema_alpha: 0.25   # EMA weight on the new threshold (0=frozen, 1=no smoothing)
  pass2_count_gate_max_factor: 1.7  # skip EMA update if blob count changes by more than this factor

geometry:
  z_frustum_top_padding: 0.0045   # metres added above the topmost outer LED axial position
  z_frustum_bot_padding: 0.0055   # metres subtracted below the bottommost outer LED axial position
  wall_thickness: 0.007           # frustum wall thickness in metres (R_fc_inner = R_fc - wall_thickness)

matching:

  # --------------------------------------------------------------------------
  # LED physical model
  # --------------------------------------------------------------------------
  led_facing_angle_deg: 85.0      # emission half-angle; LEDs beyond this from camera axis are culled
  led_radius_mm: 3.0              # physical emitter radius; drives depth-scaled snap and size thresholds

  # --------------------------------------------------------------------------
  # Blob size filtering  (shared pre-filter for both brute and proximity)
  # --------------------------------------------------------------------------
  log_size_filter: false
  blob_size_max_factor: 10.0       # blob radius > expected * this → rejected (merged blob / noise)
  blob_size_min_factor: 0.01       # blob radius < expected * this → rejected (sub-pixel noise)
  blob_size_score_weight: 0.5     # px penalty per px of size mismatch added to argmin score

  # --------------------------------------------------------------------------
  # Brute match
  # --------------------------------------------------------------------------
  depth_tiers:                    # (anchor_leds, total_leds [, "edge"]) hypotheses to enumerate
    - [2, 3]
    - [2, 4]
    - [2, 4, "edge"]
#    - [3, 5]
#    - [3, 5, "edge"]
#    - [4, 6]
  p4_threshold_px: 2.5
  hungarian_threshold_px: 5.0    # loose pre-filter on raw P3P pose; RANSAC does the real filtering
  reprojection_threshold: 2.5    # RANSAC inlier threshold
  min_inliers: 4
  min_inlier_fraction: null      # e.g. 0.6 — overrides min_inliers if set (fraction of visible LEDs)
  strong_match_error_px: 1.0
  min_vis_coverage: 0.7
  rng_seed: 42

  # --------------------------------------------------------------------------
  # Proximity match
  # --------------------------------------------------------------------------
  use_proximity_match: true              # set to false to always use brute force
  proximity_min_inliers: 3               # min inliers for proximity match (can be lower than min_inliers
                                          # because the pose prior is already close; null = use min_inliers)
  proximity_reprojection_threshold: 2.0  # RANSAC threshold (tighter than brute — prior is already close)
  proximity_expansion_px: 15.0           # Hungarian acceptance gate (px) for all cameras; velocity-scaled: gate = base + k * v_px
  proximity_expansion_velocity_k: 0.7   # extra px per px/frame of estimated velocity
  proximity_mutual_exclusion_px: 5.0  # Phase 3 radius: blobs within this of a later controller's projected
                                        # LEDs (and closer to it) are reserved when only one controller has a pose
  voronoi_max_dist_px: 100.0           # Phase 4 radius: when both controllers have poses, partition all blobs
                                        # within this distance of either controller's LEDs (full Voronoi territory)

  # --------------------------------------------------------------------------
  # Multi-controller ordering
  # --------------------------------------------------------------------------
  first_controller: "right"            # "right" or "left": which controller runs first and claims blobs first
                                        # when both controllers have equal tracking status (both tracked or both cold)

  # --------------------------------------------------------------------------
  # Pose prediction
  # --------------------------------------------------------------------------
  pose_history_window: 4             # max poses kept for _predict_pose; 1=constant pos, 2=const vel, 3+=linear fit
  pose_prediction_weight_decay: 0.7  # exponential weight decay per frame (0→only last frame, 1→equal weights)
  pose_prediction_vel_ema_beta: 0.3  # EMA weight on newest velocity step (0=frozen, 1=no smoothing)

  # --------------------------------------------------------------------------
  # Pose validation
  # --------------------------------------------------------------------------
  accept_error_px: 1.5                          # max mean reprojection error to accept any solution
  pose_jump_pos_thresh_m: [0.25, 0.25, 0.30]    # per-axis translation jump limit [x, y, z] in metres
  pose_jump_rot_thresh_deg: [30.0, 30.0, 30.0]  # per-axis rotation jump limit [rx, ry, rz] in degrees

  # --------------------------------------------------------------------------
  # Joint multi-camera optimisation
  # --------------------------------------------------------------------------
  joint_optimization: true         # run joint LM over all cameras after RANSAC when aux correspondences exist
  joint_primary_weight: 2.0        # primary-camera residual multiplier (slight preference: RANSAC-validated vs Hungarian)
  joint_huber_scale: 1.5           # Huber loss threshold in pixels; residuals beyond this are soft-capped
  joint_aux_prefilter_px: 4.0      # drop aux pairs with reprojection > this before joint LM

  # --------------------------------------------------------------------------
  # Cross-controller occlusion
  # --------------------------------------------------------------------------
  cross_controller_occlusion: true        # mask LEDs of controller B that are occluded by controller A's body
  cross_occlusion_bounding_radius_m: 0.18  # controller body bounding sphere radius (tune manually)
  cross_occlusion_gate_margin_px: 20.0     # slack added to the 2D projection gate threshold

  # --------------------------------------------------------------------------
  # Primary camera selection
  # --------------------------------------------------------------------------
  fixed_primary_camera: null       # integer camera index to always use as primary, or null = auto-select

  # --------------------------------------------------------------------------
  # Camera handoff (ignored when fixed_primary_camera is set)
  # --------------------------------------------------------------------------
  camera_handoff: true             # promote aux camera to primary when it dominates for several frames
  handoff_coverage_ratio: 1.2      # aux must have >= this * primary LED count
  handoff_min_advantage: 2         # aux must have >= this many more LEDs than primary (absolute)
  handoff_hysteresis_frames: 1     # must dominate for this many consecutive frames before switching

self_calibration:
  enabled: false                  # set to true to enable online intrinsic calibration
  primary_camera: 1               # camera used as 3D reference (its T_imu_cam is the anchor)
  lock_primary: false             # prevent handoff away from primary_camera
  aux_cameras: [3]                # cameras to calibrate; null = all non-primary cameras
  optimize_params: [fx, fy, cx, cy, p1, p2]  # subset of: fx fy cx cy k1 k2 p1 p2 k3 k4 k5 k6
  min_primary_error_px: 0.5       # only accept frames with primary PnP error below this
  min_primary_inliers: 4          # minimum PnP inliers for a frame to be accepted
  plots_dir: "./data/cameras/"    # directory where self_cal_cam{N}.png plots are saved

debug:
  calibration_csv: null # "./data/calib_warm.csv"   # path to write threshold calibration data, e.g. "./data/calib_thresholds.csv"
  mode_active: true
  split_to_folders: false
  verbose_all: false              # log every P3P hypothesis (no LED/blob filter needed)
  log_best: true                  # log each new best solution update
  debug_led_ids: null # [4, 15, 17]            # e.g. [0, 14, 3]  — LED triple [anchor, l1, l2]
  debug_blob_ids: null # [0, 5, 4]          # e.g. [2, 5, 3]  — blob triple [b_anchor, b1, b2]

visualization:
  3d_model_path: "./data/controllers/reverb_g2_controller_3d_model.stp"
  save_recording: "./visualization/recording.rrd"  # set to null to disable saving
  fine_tune_alignment: false  # set to true to run alignment optimiser and print refined params
